[[headers]]
  for = "/.netlify/functions/og-image"
  [headers.values]
    Cache-Control = "public, max-age=604800, s-maxage=604800, stale-while-revalidate=86400"
    Content-Type  = "image/png"

# Magazine pages — indexable, short cache
[[headers]]
  for = "/magazine/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag  = "index, follow"

# Magazine sitemaps — always fresh
[[headers]]
  for = "/magazine/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"
    Content-Type  = "application/xml; charset=UTF-8"

[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"
    Content-Type  = "application/xml; charset=UTF-8"

# Badge SVGs — long cache, immutable
[[headers]]
  for = "/images/badges/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers for security + performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://js.stripe.com https://www.googletagmanager.com https://t.rb2b.com https://d.rb2b.com https://ddwl4m2hdecbv.cloudfront.net https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; connect-src 'self' https://*.supabase.co https://api.stripe.com https://api.openphone.com https://api.anthropic.com https://api.pexels.com https://pixabay.com https://api.unsplash.com https://t.rb2b.com https://d.rb2b.com https://ddwl4m2hdecbv.cloudfront.net; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'"

# Cache static assets aggressively
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Admin assets — no stale-while-revalidate so phones always get fresh code
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker must NEVER be cached — critical for updates on Safari/mobile
# MUST come AFTER the generic /*.js rule — Netlify last-match wins for duplicate headers
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    # Removed Clear-Site-Data — it was wiping IndexedDB image storage

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# HTML pages — always revalidate with server
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# index.html (SPA root) — never cache stale
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
