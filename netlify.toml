[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  CLOUDINARY_CLOUD_NAME = "dlc1yycrq"
  CLOUDINARY_API_KEY = "298374161394417"
  CLOUDINARY_API_SECRET = "gyQJJ1uI6RQYC5-tHZngdJ1C1is"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["web-push", "nodemailer"]

# OG image function — needs satori + resvg-js
# Run: npm install satori @resvg/resvg-js
[functions."og-image"]
  included_files = ["netlify/functions/fonts/**"]

# Holiday drip email — runs daily at 9am EST (14:00 UTC)
[functions."holiday-drip"]
  schedule = "0 14 * * *"

# SMS drip campaign — runs every 30 min during business hours
[functions."sms-drip"]
  schedule = "*/5 * * * *"

# Monty follow-up + dormant reactivation — runs every hour
[functions."monty-followup"]
  schedule = "0 * * * *"

# The Promoter — posts to FB, IG, GBP daily at 9am + 5pm CT (14:00 + 22:00 UTC)
[functions."agent-promoter"]
  # PAUSED 2026-03-31 — Instagram flag, resume tomorrow
  # schedule = "0 14 * * *"

# The Responder — smart GBP review check every 4 hours (skips if no unanswered reviews)
[functions."agent-responder"]
  schedule = "0 */4 * * *"

# The Creator — generates weekly content batch (Sundays at 8am CT = 13:00 UTC)
[functions."agent-creator"]
  schedule = "0 13 * * 0"

# The Blogger — generates new blog post with voiceover (Wednesdays 7am CT = 12:00 UTC)
[functions."agent-blogger"]
  schedule = "0 12 * * 3"

