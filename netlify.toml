  from = "/about"
  to = "/about.html"
  status = 200

# Founder page
[[redirects]]
  from = "/founder"
  to = "/founder.html"
  status = 200

# Portfolio page
[[redirects]]
  from = "/portfolio"
  to = "/portfolio.html"
  status = 200

# Contact page
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# Sub-account tenant portal — completely separate from NUI admin
[[redirects]]
  from = "/portal"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/portal/"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/portal/*"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
