  to = "/app/index.html"
  status = 200

# Print shop page
[[redirects]]
  from = "/print"
  to = "/print.html"
  status = 200

# SPA fallback — Netlify auto-routes /.netlify/functions/* before this (MUST BE LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

