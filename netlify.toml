[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Holiday drip email — runs daily at 9am EST (14:00 UTC)
[functions."holiday-drip"]
  schedule = "0 14 * * *"

# SMS drip campaign — runs every 30 min during business hours
[functions."sms-drip"]
  schedule = "*/5 * * * *"

# Service pages — serve actual HTML files
[[redirects]]
  from = "/services/:service"
  to = "/services/:service.html"
  status = 200

# Blog index — serve SPA (real blog with all posts lives in marketing.js)
[[redirects]]
  from = "/blog"
  to = "/index.html"
  status = 200

# Blog posts
[[redirects]]
  from = "/blog/:post"
  to = "/index.html"
  status = 200

# Case study pages
[[redirects]]
  from = "/work/:project"
  to = "/work/:project.html"
  status = 200

# Geo landing pages — serve actual HTML files
[[redirects]]
  from = "/locations/:city"
  to = "/locations/:city.html"
  status = 200

# About page
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

# Founder page
[[redirects]]
  from = "/founder"
  to = "/founder.html"
  status = 200

# Portfolio page
[[redirects]]
  from = "/portfolio"
  to = "/portfolio.html"
  status = 200

# Contact page
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# Portal → App shell (dedicated admin/client/designer app)
[[redirects]]
  from = "/portal"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/portal/*"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# Print shop page
[[redirects]]
  from = "/print"
  to = "/print.html"
  status = 200

# SPA fallback — Netlify auto-routes /.netlify/functions/* before this (MUST BE LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

