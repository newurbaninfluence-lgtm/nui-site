  <!-- NOTE: admin-subaccounts.js intentionally NOT loaded here.
       Sub-account tenants cannot create their own sub-accounts. -->

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // agency-tenant.js runs in capture phase (before this) and sets
    // window._agencyTenantActive = true if ?agency=SLUG was found.
    // If no slug — show a "portal not found" message instead of NUI admin.
    if (!window._agencyTenantActive) {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('agency');
      if (!slug) {
        // No agency slug — redirect to NUI admin
        window.location.replace('/app/');
        return;
      }
      // Has slug but tenant system hasn't fired yet — it handles the rest
    }
  });
  </script>
